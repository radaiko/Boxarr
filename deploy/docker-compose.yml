services:
  sab2torbox:
    image: ghcr.io/radaiko/sab2torbox:latest
    container_name: sab2torbox
    restart: unless-stopped
    environment:
      - SAB2TORBOX_TORBOX_API_TOKEN=${TORBOX_API_TOKEN}
      - SAB2TORBOX_SAB_API_KEY=${SAB_API_KEY}
      - SAB2TORBOX_WEBDAV_MOUNT_ROOT=/mnt/torbox
      # Leave empty: TorBox creates one folder per release directly under the
      # mount root. Set only if your WebDAV nests releases under a subdir.
      - SAB2TORBOX_WEBDAV_USENET_SUBPATH=
      # Required. Completed downloads are published as symlinks here; the
      # library must share this filesystem (bind-mounted below, and into the
      # Sonarr/Radarr/Plex containers too).
      - SAB2TORBOX_SYMLINK_ROOT=/mnt/smedia/_incoming
      - SAB2TORBOX_DATABASE_PATH=/config/sab2torbox.db
      - SAB2TORBOX_POLL_INTERVAL=1m
      - SAB2TORBOX_LOG_LEVEL=info
      - SAB2TORBOX_CATEGORIES=sonarr,radarr,sonarr-anime
      # Optional: auto-force TorBox's WebDAV refresh on completion. Set both
      # credentials to enable; the password is your TorBox API token.
      - SAB2TORBOX_TORBOX_WEBDAV_USER=${TORBOX_WEBDAV_USER:-}
      - SAB2TORBOX_TORBOX_WEBDAV_PASS=${TORBOX_WEBDAV_PASS:-}
      - TZ=Europe/Vienna
    ports:
      - "8181:8080"
    volumes:
      # /config must be writable by uid 65532 (the distroless nonroot user).
      - ./config:/config
      # The rclone WebDAV mount. rslave lets the container see the host mount
      # without propagating its own mounts back to the host.
      - type: bind
        source: /mnt/torbox
        target: /mnt/torbox
        bind:
          propagation: rslave
      # The filesystem holding SYMLINK_ROOT and the media library. Mount it
      # into the Sonarr/Radarr/Plex containers at the same path too.
      - type: bind
        source: /mnt/smedia
        target: /mnt/smedia
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD", "/sab2torbox", "healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
