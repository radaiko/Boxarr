services:
  boxarr:
    image: ghcr.io/radaiko/boxarr:latest
    container_name: boxarr
    restart: unless-stopped
    environment:
      # ── Core (required) ──
      - BOXARR_TORBOX_API_TOKEN=${TORBOX_API_TOKEN}
      - BOXARR_PROWLARR_URL=${PROWLARR_URL}
      - BOXARR_PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - BOXARR_TMDB_API_KEY=${TMDB_API_KEY}
      - BOXARR_WEBDAV_MOUNT_ROOT=/mnt/torbox
      # Leave empty: TorBox creates one folder per release directly under the
      # mount root. Set only if your WebDAV nests releases under a subdir.
      - BOXARR_WEBDAV_USENET_SUBPATH=
      - BOXARR_WEBDAV_TORRENT_SUBPATH=
      # Library roots (Plex-standard layout). Must share the WebDAV mount's
      # filesystem and be mounted at the SAME absolute path in the Plex container.
      - BOXARR_MOVIE_LIBRARY_ROOT=/data/movies
      - BOXARR_TV_LIBRARY_ROOT=/data/tv
      # SYMLINK_ROOT is transitional (the reused worker still references it; the
      # importer drops it in Phase 1). Point it inside the shared filesystem.
      - BOXARR_SYMLINK_ROOT=/data/_incoming
      - BOXARR_DATABASE_PATH=/config/boxarr.db
      - BOXARR_POLL_INTERVAL=1m
      - BOXARR_RECONCILE_INTERVAL=15m
      - BOXARR_METADATA_REFRESH_INTERVAL=24h
      - BOXARR_LOG_LEVEL=info
      # ── Optional integrations ──
      - BOXARR_API_KEY=${BOXARR_API_KEY:-}
      - BOXARR_TVDB_API_KEY=${TVDB_API_KEY:-}
      - BOXARR_TVDB_PIN=${TVDB_PIN:-}
      - BOXARR_PLEX_URL=${PLEX_URL:-}
      - BOXARR_PLEX_TOKEN=${PLEX_TOKEN:-}
      - BOXARR_SEERR_API_KEYS=${SEERR_API_KEYS:-}
      # Optional: auto-force TorBox's WebDAV refresh on completion (both creds).
      - BOXARR_TORBOX_WEBDAV_USER=${TORBOX_WEBDAV_USER:-}
      - BOXARR_TORBOX_WEBDAV_PASS=${TORBOX_WEBDAV_PASS:-}
      - TZ=Europe/Vienna
    ports:
      - "8181:8080"
    volumes:
      # /config must be writable by uid 65532 (the distroless nonroot user).
      - ./config:/config
      # The rclone WebDAV mount. rslave lets the container see the host mount
      # without propagating its own mounts back to the host. Mount at the SAME
      # absolute path in the Plex container (Assumption D).
      - type: bind
        source: /mnt/torbox
        target: /mnt/torbox
        bind:
          propagation: rslave
      # The filesystem holding the movie + TV library roots (same FS as the
      # WebDAV mount). Mount into the Plex container at the same path too.
      - type: bind
        source: /data
        target: /data
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD", "/boxarr", "healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
