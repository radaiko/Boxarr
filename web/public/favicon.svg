<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffba52"/>
      <stop offset="1" stop-color="#f4a02c"/>
    </linearGradient>
  </defs>
  <!-- slate tile -->
  <rect width="32" height="32" rx="8" fill="#0f1218"/>
  <!-- the box -->
  <rect x="5" y="7" width="22" height="18" rx="2.5" fill="url(#g)"/>
  <!-- packing tape: horizontal flap seam + vertical strip (the "box-tape" mark) -->
  <rect x="5" y="12.4" width="22" height="2" fill="#1c1304" opacity="0.32"/>
  <rect x="14.5" y="7" width="3" height="18" fill="#1c1304" opacity="0.16"/>
  <rect x="5" y="7" width="22" height="18" rx="2.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.8"/>
</svg>
